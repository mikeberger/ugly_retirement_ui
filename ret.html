<!DOCTYPE html>
<html>

<head>
  <meta charset="ISO-8859-1">
  <title>Retirement Planner</title>
  <link rel="stylesheet" href="basic.css">
</head>

<body>

  <script>

    "use strict";

    var fields = [];
    const rmdTbl = [26.5, 25.5, 24.6, 23.7, 22.9, 22.0, 21.1, 20.2, 19.4, 18.5, 17.7, 16.8, 16.0, 15.2, 14.4, 13.7, 12.9, 12.2, 11.5, 10.8, 10.1, 9.5, 8.9, 8.4, 7.8, 7.3, 6.8, 6.4];

    const SCENARIOS_KEY = 'retirement_scenarios';
    const CURRENT_SCENARIO_KEY = 'current_scenario';

    function getScenarios() {
      const data = localStorage.getItem(SCENARIOS_KEY);
      return data ? JSON.parse(data) : {};
    }

    function saveScenarios(scenarios) {
      localStorage.setItem(SCENARIOS_KEY, JSON.stringify(scenarios));
    }

    function getCurrentScenarioName() {
      return localStorage.getItem(CURRENT_SCENARIO_KEY) || 'Default';
    }

    function setCurrentScenarioName(name) {
      localStorage.setItem(CURRENT_SCENARIO_KEY, name);
    }

    function store() {
      const name = prompt('Enter scenario name:', getCurrentScenarioName());
      if (name === null) return; // User cancelled

      const scenarios = getScenarios();
      const scenarioData = {};

      for (const field of fields) {
        scenarioData[field] = document.getElementById(field).value;
      }

      scenarios[name] = scenarioData;
      saveScenarios(scenarios);
      setCurrentScenarioName(name);
      updateScenarioList();
      alert(`Scenario "${name}" saved successfully!`);
    }

    function load() {
      const scenarios = getScenarios();
      const currentScenario = getCurrentScenarioName();
      const scenarioData = scenarios[currentScenario];

      if (scenarioData) {
        for (const field of fields) {
          if (scenarioData[field] !== undefined) {
            document.getElementById(field).value = scenarioData[field];
          }
        }
      }
    }

    function loadScenario(name) {
      const scenarios = getScenarios();
      if (scenarios[name]) {
        setCurrentScenarioName(name);
        load();
        updateScenarioList();
      }
    }

    function deleteScenario(name) {
      if (!confirm(`Delete scenario "${name}"?`)) return;

      const scenarios = getScenarios();
      delete scenarios[name];
      saveScenarios(scenarios);

      if (getCurrentScenarioName() === name) {
        const scenarioNames = Object.keys(scenarios);
        setCurrentScenarioName(scenarioNames.length > 0 ? scenarioNames[0] : 'Default');
        load();
      }

      updateScenarioList();
      alert(`Scenario "${name}" deleted.`);
    }

    function updateScenarioList() {
      const scenarios = getScenarios();
      const currentScenario = getCurrentScenarioName();
      const listContainer = document.getElementById('scenarioList');
      
      if (!listContainer) return;

      listContainer.innerHTML = '';

      const scenarioNames = Object.keys(scenarios);
      if (scenarioNames.length === 0) {
        listContainer.innerHTML = '<p>No scenarios saved yet.</p>';
        return;
      }

      const list = document.createElement('ul');
      list.style.listStyleType = 'none';
      list.style.padding = '0';

      scenarioNames.forEach(name => {
        const item = document.createElement('li');
        item.style.margin = '5px 0';
        item.style.padding = '5px';
        item.style.backgroundColor = name === currentScenario ? '#d0d0d0' : 'transparent';
        item.style.borderRadius = '4px';

        const label = document.createElement('span');
        label.textContent = name;
        label.style.marginRight = '10px';
        label.style.fontWeight = name === currentScenario ? 'bold' : 'normal';
        label.style.cursor = 'pointer';
        label.onclick = () => loadScenario(name);
        item.appendChild(label);

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Delete';
        deleteBtn.style.marginLeft = '10px';
        deleteBtn.style.padding = '2px 8px';
        deleteBtn.style.fontSize = '0.9em';
        deleteBtn.onclick = () => deleteScenario(name);
        item.appendChild(deleteBtn);

        list.appendChild(item);
      });

      listContainer.appendChild(list);
    }

    function compute() {

      let inflationRate = Number(document.getElementById("inflation").value) / 100.0;
      let investmentReturn = Number(document.getElementById("invret").value) / 100.0;
      let pretax = Number(document.getElementById("pretax").value); // IRA and 401k
      let posttax = Number(document.getElementById("posttax").value); // non retirement money
      let ss = Number(document.getElementById("ss").value);// social security before tax
      let ssAge = Number(document.getElementById("ssage").value);
      let obama = Number(document.getElementById("aca").value);
      let medicare = Number(document.getElementById("medicare").value);
      let taxRate = Number(document.getElementById("tax").value) / 100.0; // fed income tax rate
      let retAge = Number(document.getElementById("retage").value); // retirement age
      let curAge = Number(document.getElementById("curage").value);
      let spending = Number(document.getElementById("spend").value);
      let sev = Number(document.getElementById("sev").value);
      let preretincome = Number(document.getElementById("preret").value);
      let postretincome = Number(document.getElementById("postret").value);
      let pre1 = Number(document.getElementById("pre1").value);
      let pre2 = Number(document.getElementById("pre2").value);
      let post1 = Number(document.getElementById("post1").value);
      let post2 = Number(document.getElementById("post2").value);
      let pre1age = Number(document.getElementById("pre1age").value);
      let pre2age = Number(document.getElementById("pre2age").value);
      let post1age = Number(document.getElementById("post1age").value);
      let post2age = Number(document.getElementById("post2age").value);


      const fmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });

      var output = "";

      let endAge = 100;
      let medicareAge = 65;
      let rmdAge = 73;
      let ssTaxPct = 85;

      for (let age = curAge; age <= endAge; age++) {
        let curss = 0.0; // SS after tax
        let tax = 0.0;
        let totalSpend = 0.0;


        if (age < retAge) {
          totalSpend = spending;
        }
        else if (age <= medicareAge) {
          totalSpend = spending + obama;
        }
        else {
          totalSpend = spending + medicare;
        }

        // severance
        if (age == retAge) {
          posttax += sev * (1.0 - taxRate);
          tax += (sev * taxRate);
        }

        // income
        if (age < retAge) {
          posttax += preretincome * (1.0 - taxRate);
          tax += preretincome * taxRate;
        } else {
          posttax += postretincome * (1.0 - taxRate);
          tax += postretincome * taxRate;
        }

        // asset changes
        if (age == pre1age) pretax += pre1;
        if (age == pre2age) pretax += pre2;
        if (age == post1age) posttax += post1;
        if (age == post2age) posttax += post2;



        // RMD
        let index = age - rmdAge;
        let divisor = index < rmdTbl.length ? rmdTbl[index] : rmdTbl[rmdTbl.length - 1];
        let rmd = pretax / divisor;
        if (age >= rmdAge && pretax >= rmd) {
          pretax -= rmd;
          posttax += rmd * (1.0 - taxRate);
          tax += rmd * taxRate;
        } else if (age >= rmdAge && pretax > 0) {
          rmd = pretax;
          posttax += pretax * (1.0 - taxRate);
          tax += pretax * taxRate;
          pretax = 0.0;
        } else {
          rmd = 0.0;
        }

        // SS - ignore fractional year at start age
        if (age > ssAge) {
          curss = ss * (1.0 - taxRate * ssTaxPct / 100);
          posttax += curss;
          tax += ss * taxRate * ssTaxPct / 100;
        }

        // spend
        let maxspend = posttax + (pretax * (1 - taxRate));
        if (totalSpend >= maxspend) {
          posttax = 0;
          pretax = 0;
          totalSpend = maxspend;
        }
        else if (posttax >= totalSpend) {
          posttax -= totalSpend;
        } else {
          let s = totalSpend;
          s -= posttax;
          posttax = 0;
          pretax -= (s / (1.0 - taxRate));
        }

         // investment
        pretax = pretax * (1.0 + investmentReturn);

        let postearnings = posttax * investmentReturn;
        posttax += postearnings * (1.0 - taxRate);
        tax += postearnings * taxRate;


        // inflation
        pretax *= (1.0 - inflationRate);
        posttax *= (1.0 - inflationRate);


        output += `Age ${age}\tTotal = ${fmt.format(pretax + posttax)}\tpretax = ${fmt.format(pretax)}\tposttax = ${fmt.format(posttax)}\tspending = ${fmt.format(totalSpend)}\tTax = ${fmt.format(tax)}`;
        if (curss > 0) output += `\tSS = ${fmt.format(curss)}`;
        if (rmd > 0) output += `\tRMD = ${fmt.format(rmd)}`;
        output += `\n`;
      }


      document.getElementById("output").value = output;
    }

    function addInput(id, text, def) {
      const form = document.getElementById('form1');
      const label = document.createElement('label');
      label.textContent = text;
      form.appendChild(label);
      const input = document.createElement('input');
      input.setAttribute('type', 'text');
      input.setAttribute('id', id);
      input.setAttribute('value', def);
      form.appendChild(input);
      fields.push(id);
      

    }

    function addBR() {
      const form = document.getElementById('form1');
      const br = document.createElement('br');
      form.appendChild(br);
    }

    function reset() {
      if (confirm('Clear all scenarios and reset to defaults?')) {
        localStorage.clear();
        location.reload();
      }
    }

    function init() {
      addInput("curage", "Current Age", 55);
      addBR();
      addInput("retage", "Retirement Age", 65);
      addBR();
      addInput("preret", "Pre-Retirement Income", 70000);
      addBR();
      addInput("postret", "Post-Retirement Income", 0);
      addBR();
      addInput("spend", "Spending per year without medical", 50000);
      addBR();
      addInput("ss", "Social Security", 40000);
      addInput("ssage", "Social Security Age", 67);
      addBR();
      addInput("aca", "ACA/Medical Cost (retirement thru 65)", 0);
      addBR();
      addInput("medicare", "Medicare Cost", 15000);
      addBR();
      addInput("posttax", "Post Tax Assets", 250000);
      addBR();
      addInput("pretax", "Pre Tax Assets (IRA/401k)", 500000);
      addBR();
      addInput("invret", "Investment Return across ALL assets", 4);
      addBR();
      addInput("inflation", "Average Inflation throughout retirement", 3);
      addBR();
      addInput("tax", "Overall Income Tax Rate", 12);
      addBR();
      addInput("sev", "Severance", 0);
      addBR();
      addInput("pre1", "Pre Tax Change", 0);
      addInput("pre1age", "Age", 75);
      addBR();
      addInput("pre2", "Pre Tax Change", 0);
      addInput("pre2age", "Age", 75);
      addBR();
      addInput("post1", "Post Tax Change", 0);
      addInput("post1age", "Age", 75);
      addBR();
      addInput("post2", "Post Tax Change", 0);
      addInput("post2age", "Age", 75);
      addBR();

    }

    window.onload = function wload() { init(); load(); updateScenarioList(); }



  </script>

  <h1>Retirement Planner</h1>
  
  <form id="form1">

  </form>

  <br>
  <label>All values in today's dollars. Use yearly SS estimate from ssa.gov (minus whatever haircut you
    predict)</label>

  <br>
  <button onclick="compute();">Calculate</button>
  <button onclick="store();">Save Scenario</button>
  <button onclick="reset();">Reset All</button>
  <br>
  <br>

  <div style="display: flex; gap: 20px; margin-bottom: 20px;">
    <div style="flex: 0 0 250px;">
      <h3>Saved Scenarios</h3>
      <div id="scenarioList" style="border: 1px solid #ccc; padding: 10px; border-radius: 4px; min-height: 100px; max-height: 300px; overflow-y: auto;"></div>
    </div>
  </div>

  <h3>Results</h3>
  <textarea id="output" rows="45" cols="200"></textarea>
</body>

</html>
